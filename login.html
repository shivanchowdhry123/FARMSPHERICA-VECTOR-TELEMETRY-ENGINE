<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <img src="images/logo.svg" alt="Logo" style="width: 80px; margin-bottom: 20px;">
            <h2>Vector Telemetry Login</h2>
            <form id="login-form" style="margin-top: 20px;">
                <input type="email" placeholder="Email" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <input type="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 20px;">
                <button type="submit" style="background: var(--accent); color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%;">Access Portal</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // This is pure theater. 
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
