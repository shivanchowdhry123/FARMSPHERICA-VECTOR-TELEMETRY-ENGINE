<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Settings</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="settings">
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo-area">
                <img src="images/logo.svg" alt="Logo" class="logo">
                <span>Farmspherica</span>
            </div>
            <nav id="page-list">
                <ul>
                    <li><a href="index.html" class="nav-dashboard">Dashboard</a></li>
                    <li><a href="logger.html" class="nav-logger">Logger</a></li>
                    <li><a href="analytics.html" class="nav-analytics">Analytics</a></li>
                    <li><a href="nodes.html" class="nav-nodes">Nodes</a></li>
                    <li><a href="settings.html" class="nav-settings">Settings</a></li>
                </ul>
            </nav>
            <div class="platform-name">VECTOR ENGINE v1.0</div>
        </aside>

        <div class="main-content">
            <header>
                <h2>Settings</h2>
                <div class="user-menu" id="user-menu">
                    <img src="images/profile-placeholder.png" style="width:30px; border-radius:50%;">
                    <div id="options-bar">
                        <p>Profile | Logout</p>
                    </div>
                </div>
            </header>
            <main id="view-port">
                <section style="max-width: 600px;">
                    <div style="margin-bottom: 30px;">
                        <h3>System Theme</h3>
                        <select style="width: 100%; padding: 10px; margin-top: 10px;">
                            <option>Eco-Minimalist (Default)</option>
                            <option>High-Contrast Dark</option>
                            <option>Monochrome</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h3>Measurement Metrics</h3>
                        <label style="display: block; margin: 10px 0;">
                            <input type="radio" name="units" checked> Metric (SI)
                        </label>
                        <label style="display: block; margin: 10px 0;">
                            <input type="radio" name="units"> Imperial
                        </label>
                    </div>

                    <div>
                        <h3>Data Sync</h3>
                        <button style="background: #1a1c1e; color: #fff; padding: 10px 20px; border: none; cursor: pointer;">Initialize Cloud Sync</button>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
