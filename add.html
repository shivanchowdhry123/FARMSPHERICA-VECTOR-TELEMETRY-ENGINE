<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Add Data</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="add-data">
    <div class="app-container" style="padding: 2rem;">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Log Telemetry Vector</h2>
            <a href="logger.html" id="add-data-link" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem;">
                ← Back to Logger
            </a>
<form id="add-form">
    <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required />
    </div>
    <div class="form-group">
        <label for="ph">pH Level</label>
        <input type="number" step="0.01" id="ph" name="ph" required />
    </div>
    <div class="form-group">
        <label for="ec">EC (mS)</label>
        <input type="number" step="0.01" id="ec" name="ec" required />
    </div>
    <div class="form-group">
        <label for="temp">Temperature (°C)</label>
        <input type="number" step="0.1" id="temp" name="temp" required />
    </div>
    <div class="form-actions">
        <button type="submit" data-action="submit-add">Add Record</button>
        <a href="logger.html" class="cancel-link" style="margin-left:1rem;">Cancel</a>
    </div>
</form>
<script type="module">
    import { addRecord } from './js/storage.js';
    document.getElementById('add-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const record = {
            id: crypto.randomUUID(),
            date: document.getElementById('date').value,
            ph: parseFloat(document.getElementById('ph').value),
            ec: parseFloat(document.getElementById('ec').value),
            temp: parseFloat(document.getElementById('temp').value)
        };
        addRecord(record);
        // redirect to logger to see table update
        window.location.href = 'logger.html';
    });
</script>
        </div>
    </div>
</body>
</html>
