<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Add Data</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="add-data">
    <!-- Apply saved theme immediately (dark is default) -->
    <script>
        (function(){
            var t = localStorage.getItem('theme') || 'dark';
            document.body.dataset.theme = t;
        })();
    </script>
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-main); padding:2rem;">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Log Telemetry Vector</h2>
            <a href="logger.html" id="add-data-link" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem;">
                ← Back to Logger
            </a>
            <form id="add-form">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required />
                </div>
                <div class="form-group">
                    <label for="ph">pH Level</label>
                    <input type="number" step="0.01" id="ph" name="ph" required />
                </div>
                <div class="form-group">
                    <label for="ec">EC (mS)</label>
                    <input type="number" step="0.01" id="ec" name="ec" required />
                </div>
                <div class="form-group">
                    <label for="temp">Temperature (°C)</label>
                    <input type="number" step="0.1" id="temp" name="temp" required />
                </div>
                <div class="form-actions">
                    <button type="submit" data-action="submit-add">Add Record</button>
                    <a href="logger.html" class="cancel-link" style="margin-left:1rem;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
