<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Logger</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="logger">
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo-area">
                <img src="images/logo.svg" alt="Logo" class="logo">
                <span>Farmspherica</span>
            </div>
            <nav id="page-list">
                <ul>
                    <li><a href="dashboard.html" class="nav-dashboard">Dashboard</a></li>
                    <li><a href="analytics.html" class="nav-analytics">Analytics</a></li>
                    <li><a href="logger.html" class="nav-logger">Logger</a></li>
                    <li><a href="nodes.html" class="nav-nodes">Nodes</a></li>
                    <li><a href="settings.html" class="nav-settings">Settings</a></li>
                </ul>
            </nav>
             <div class="platform-name">VECTOR ENGINE v1.0</div>
        </aside>

        <div class="main-content">
            <header>
                <button data-action="toggle-sidebar" id="toggle-sidebar">☰</button>
                <h2 id="page-title">Logger</h2>
                <div class="user-menu" id="user-menu">
                    <img src="images/profile-placeholder.png" style="width:30px; border-radius:50%;">
                    <div id="options-bar">
                        <p><a href="settings.html" id="user-profile">Profile</a> | <a href="index.html" id="user-logout">Logout</a></p>
                    </div>
                </div>
            </header>
            <main id="view-port">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button data-action="toggle-selection-mode" id="toggle-selection-btn" style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer;">
                            Enable Bulk Selection
                        </button>
                        <div id="bulk-actions-group" style="display: none; gap: 10px; align-items: center;">
                            <button data-action="export-selected" id="export-selected-btn" style="background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer;">
                                Export Selected (.json)
                            </button>
                            <button data-action="delete-selected" id="delete-selected-btn" style="background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer;">
                                Delete Selected
                            </button>
                        </div>
                    </div>
                    <a href="add.html" id="add-data-link" class="action-link" style="margin-left: auto;">+ add new data</a>
                </div>

                <section>
                    <table id="logger-table" style="width: 100%; border-collapse: collapse; border: 0.5px solid var(--border);">
                        <thead>
                            <tr style="text-align: left; border-bottom: 0.5px solid var(--border);">
                                <th class="checkbox-col" style="padding: 10px; width: 40px;"><input type="checkbox" id="select-all"></th>
                                <th style="padding: 10px;">Timestamp</th>
                                <th style="padding: 10px;">pH Level</th>
                                <th style="padding: 10px;">EC</th>
                                <th style="padding: 10px;">Air T</th>
                                <th style="padding: 10px;">Res T</th>
                                <th style="padding: 10px;">DO</th>
                                <th style="padding: 10px;">Lux</th>
                                <th style="padding: 10px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="logger-table-body"></tbody>
                    </table>
                </section>
                <p>System operational.</p>
            </main>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
