<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Logger</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo-area">
                <img src="images/logo.svg" alt="Logo" class="logo">
                <span>Farmspherica</span>
            </div>
            <nav id="page-list">
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="logger.html">Logger</a></li>
                    <li><a href="analytics.html">Analytics</a></li>
                    <li><a href="nodes.html">Nodes</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
             <div class="platform-name">VECTOR ENGINE v1.0</div>
        </aside>

        <div class="main-content">
            <header>
                <button id="toggle-sidebar">☰</button>
                <h2 id="page-title">Logger</h2>
                <div class="user-menu" id="user-menu">
                    <img src="images/profile-placeholder.png" style="width:30px; border-radius:50%;">
                    <div id="options-bar">
                    <p>Profile | Logout</p>
                </div>
            </header>
            <main id="view-port">
                <section>
                    <table style="width: 100%; border-collapse: collapse; border: 0.5px solid var(--border);">
                        <thead><tr style="text-align: left; border-bottom: 0.5px solid var(--border);"><th style="padding: 10px;">Timestamp</th><th style="padding: 10px;">pH Level</th><th style="padding: 10px;">Status</th></tr></thead>
                        <tbody>
                            <tr><td style="padding: 10px;">2026-06-11 09:00</td><td style="padding: 10px;">6.2</td><td style="padding: 10px;">Stable</td></tr>
                            <tr><td style="padding: 10px;">2026-06-11 08:00</td><td style="padding: 10px;">6.4</td><td style="padding: 10px;">Buffer High</td></tr>
                        </tbody>
                    </table>
                </section>
                <p>System operational.</p>
            </main>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
