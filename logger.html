<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Logger</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="logger">
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo-area">
                <img src="images/logo.svg" alt="Logo" class="logo">
                <span>Farmspherica</span>
            </div>
            <nav id="page-list">
                <ul>
                    <li><a href="index.html" class="nav-dashboard">Dashboard</a></li>
                    <li><a href="logger.html" class="nav-logger">Logger</a></li>
                    <li><a href="analytics.html" class="nav-analytics">Analytics</a></li>
                    <li><a href="nodes.html" class="nav-nodes">Nodes</a></li>
                    <li><a href="settings.html" class="nav-settings">Settings</a></li>
                </ul>
            </nav>
             <div class="platform-name">VECTOR ENGINE v1.0</div>
        </aside>

        <div class="main-content">
            <header>
                <button data-action="toggle-sidebar" id="toggle-sidebar">☰</button>
                <h2 id="page-title">Logger</h2>
                <div class="user-menu" id="user-menu">
                    <img src="images/profile-placeholder.png" style="width:30px; border-radius:50%;">
                    <div id="options-bar">
                        <p><a href="settings.html" id="user-profile">Profile</a> | <a href="login.html" id="user-logout">Logout</a></p>
                    </div>
                </div>
            </header>
            <main id="view-port">
                <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                    <a href="add.html" id="add-data-link" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem;">+ add new data</a>
                </div>

                <section>
                <table style="width: 100%; border-collapse: collapse; border: 0.5px solid var(--border);">
                    <thead>
                        <tr style="text-align: left; border-bottom: 0.5px solid var(--border);">
                            <th style="padding: 10px;">Timestamp</th>
                            <th style="padding: 10px;">pH Level</th>
                            <th style="padding: 10px;">Status</th>
                            <th style="padding: 10px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="logger-table-body">

                    </tbody>
                </table>
                </section>
                <p>System operational.</p>
            </main>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
