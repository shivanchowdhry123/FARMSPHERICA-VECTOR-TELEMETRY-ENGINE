<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Theme tokens ─────────────────────────────────────── */
        body[data-theme='dark'] {
            --bg:        #030712;
            --panel:     rgba(10, 14, 23, 0.85);
            --border:    #1e293b;
            --text:      #f8fafc;
            --sub:       #94a3b8;
            --input-bg:  rgba(255,255,255,0.05);
            --input-border: #334155;
            --accent:    #3b82f6;
            --accent-glow: rgba(59,130,246,0.35);
            --btn-text:  #ffffff;
            --toggle-bg: rgba(255,255,255,0.08);
            --toggle-hover: rgba(255,255,255,0.14);
        }
        body[data-theme='light'] {
            --bg:        #f0f4f8;
            --panel:     rgba(255,255,255,0.92);
            --border:    #e2e8f0;
            --text:      #1e293b;
            --sub:       #64748b;
            --input-bg:  #f8fafc;
            --input-border: #cbd5e1;
            --accent:    #2563eb;
            --accent-glow: rgba(37,99,235,0.25);
            --btn-text:  #ffffff;
            --toggle-bg: rgba(0,0,0,0.06);
            --toggle-hover: rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            position: relative;
        }

        /* subtle animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* accent blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
        .blob-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; right: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #10b981; bottom: -80px; left: -60px; }

        /* ── Theme toggle (top-right) ─────────────────────────── */
        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            background: var(--toggle-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s, border 0.2s;
            z-index: 100;
        }
        .theme-toggle:hover { background: var(--toggle-hover); }

        /* ── Login card ───────────────────────────────────────── */
        .login-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2.25rem;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
            transition: background 0.3s, border 0.3s;
            z-index: 10;
            position: relative;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .brand img { width: 52px; height: 52px; }
        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .brand-sub {
            font-size: 0.78rem;
            color: var(--sub);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--sub);
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s, background 0.3s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-group input::placeholder { color: var(--sub); opacity: 0.7; }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            background: var(--accent);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .login-btn:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
        .login-btn:active { transform: translateY(0); }

        .footer-note {
            text-align: center;
            font-size: 0.72rem;
            color: var(--sub);
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
        }

        /* ── Responsive ───────────────────────────────────────── */
        @media (max-width: 480px) {
            .login-card { margin: 1rem; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- theme blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- theme toggle -->
    <button class="theme-toggle" id="theme-btn" title="Toggle theme">
        <span id="theme-icon">☀️</span>
        <span id="theme-label">Light</span>
    </button>

    <!-- login card -->
    <div class="login-card">
        <div class="brand">
            <img src="images/logo.svg" alt="Farmspherica Logo" onerror="this.style.display='none'">
            <span class="brand-name">Farmspherica</span>
            <span class="brand-sub">Vector Telemetry Engine</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="operator@farmspherica.io" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">Access Portal →</button>
        </form>

        <p class="footer-note">Farmspherica Vector Engine v1.0 · Secure Access</p>
    </div>

    <script>
        // Apply saved theme immediately (dark default)
        const saved = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = saved;

        const btn   = document.getElementById('theme-btn');
        const icon  = document.getElementById('theme-icon');
        const label = document.getElementById('theme-label');

        function syncToggleUI(theme) {
            if (theme === 'dark') {
                icon.textContent  = '☀️';
                label.textContent = 'Light';
            } else {
                icon.textContent  = '🌙';
                label.textContent = 'Dark';
            }
        }
        syncToggleUI(saved);

        btn.addEventListener('click', () => {
            const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            document.body.dataset.theme = next;
            localStorage.setItem('theme', next);
            syncToggleUI(next);
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('farmspherica_auth', 'true');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
