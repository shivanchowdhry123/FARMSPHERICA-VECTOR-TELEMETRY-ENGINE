<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmspherica | Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo-area">
                <img src="images/logo.svg" alt="Logo" class="logo">
                <span>Farmspherica</span>
            </div>
            <nav id="page-list">
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="logger.html">Logger</a></li>
                    <li><a href="analytics.html">Analytics</a></li>
                    <li><a href="nodes.html">Nodes</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
             <div class="platform-name">VECTOR ENGINE v1.0</div>
        </aside>

        <div class="main-content">
            <header>
                <button id="toggle-sidebar">☰</button>
                <h2 id="page-title">Dashboard</h2>
                <div class="user-menu" id="user-menu">
                    <img src="images/profile-placeholder.png" style="width:30px; border-radius:50%;">
                    <div id="options-bar">
                    <p>Profile | Logout</p>
                </div>
            </header>
            <main id="view-port">
                <section class="dashboard-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="card" style="border: 0.5px solid var(--border); padding: 20px;">
                    <h3>Hydroponic Yield</h3>
                    <p style="font-size: 2rem;">84.2%</p>
                </div>
                <div class="card" style="border: 0.5px solid var(--border); padding: 20px;">
                    <h3>Water Recirculation</h3>
                    <p style="font-size: 2rem;">Optimal</p>
                </div>
                <div class="card" style="border: 0.5px solid var(--border); padding: 20px;">
                    <h3>Active Node Count</h3>
                    <p style="font-size: 2rem;">12/12</p>
                </div>
                </section>
                <p>System operational.</p>
            </main>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
